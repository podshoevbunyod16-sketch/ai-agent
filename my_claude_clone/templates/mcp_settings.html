{% extends "base.html" %}
{% block title %}MCP Серверы — Claude Clone{% endblock %}
{% block content %}
<div class="h-screen overflow-y-auto">
<div class="max-w-3xl mx-auto px-6 py-8">
  <h1 class="text-3xl font-bold mb-1">🛠️ MCP Серверы</h1>
  <p class="text-stone-500 mb-8">Подключай серверы MCP — Claude будет использовать их инструменты прямо в чате.</p>

  <!-- Добавить -->
  <div class="bg-white rounded-2xl border border-stone-200 shadow-sm p-6 mb-6">
    <h2 class="font-semibold text-stone-800 mb-4">Добавить сервер</h2>
    <div class="space-y-3">
      <div class="grid sm:grid-cols-2 gap-3">
        <input id="add-name"  placeholder="Имя (например, GitHub MCP)" class="w-full px-3 py-2 border border-stone-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-300">
        <input id="add-url"   placeholder="https://..." class="w-full px-3 py-2 border border-stone-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-300">
      </div>
      <input id="add-token" placeholder="Auth Token (если нужен)" type="password"
             class="w-full px-3 py-2 border border-stone-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-300">
      <button id="btn-add" class="px-5 py-2 bg-stone-800 text-white rounded-xl text-sm hover:bg-stone-900 transition">
        + Добавить
      </button>
    </div>
  </div>

  <!-- Список -->
  <div id="servers-list" class="space-y-3">
    <div class="text-stone-400 text-sm">Загрузка...</div>
  </div>
</div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function loadServers(){
  const list = document.getElementById('servers-list');
  const r = await fetch('/api/mcp-servers');
  const servers = await r.json();
  if(!servers.length){
    list.innerHTML = '<div class="text-stone-400 text-sm">Серверов нет. Добавь первый!</div>';
    return;
  }
  list.innerHTML = servers.map(s=>`
    <div id="srv-${s.id}" class="bg-white rounded-2xl border border-stone-200 shadow-sm p-5">
      <div class="flex items-start justify-between gap-4">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 bg-stone-300 rounded-full" id="dot-${s.id}"></span>
            <h3 class="font-semibold text-stone-900">${s.name}</h3>
          </div>
          <p class="text-xs text-stone-500 mt-1 break-all">${s.url}</p>
          <div id="tools-${s.id}" class="mt-3 text-xs text-stone-500"></div>
        </div>
        <div class="flex gap-2 shrink-0">
          <button onclick="testServer(${s.id})" class="px-3 py-1.5 text-xs rounded-lg border border-stone-200 hover:bg-stone-50">🔗 Проверить</button>
          <button onclick="delServer(${s.id})"  class="px-3 py-1.5 text-xs rounded-lg border border-red-200 text-red-600 hover:bg-red-50">✕</button>
        </div>
      </div>
    </div>`).join('');
  servers.forEach(s=>loadTools(s.id));
}

async function loadTools(id){
  try{
    const d = await(await fetch('/api/mcp-servers/'+id+'/tools')).json();
    const el = document.getElementById('tools-'+id);
    if(d.tools && d.tools.length){
      document.getElementById('dot-'+id).className='w-2 h-2 bg-emerald-400 rounded-full';
      el.innerHTML='<b class="text-stone-700">Инструменты:</b> '+
        d.tools.map(t=>`<span class="inline-block bg-stone-100 rounded px-1.5 py-0.5 mr-1 mt-1">${t.name||t}</span>`).join('');
    } else if(d.error){
      el.innerHTML=`<span class="text-red-400">⚠ ${d.error}</span>`;
    }
  }catch(e){}
}

async function testServer(id){
  const btn=event.target; btn.disabled=true; btn.textContent='...';
  try{
    const d=await(await fetch('/api/mcp-servers/'+id+'/test',{method:'POST'})).json();
    alert(d.message);
    if(d.success) document.getElementById('dot-'+id).className='w-2 h-2 bg-emerald-400 rounded-full';
  }catch(e){alert('Ошибка: '+e);}
  finally{btn.disabled=false; btn.textContent='🔗 Проверить';}
}

async function delServer(id){
  if(!confirm('Удалить сервер?')) return;
  await fetch('/api/mcp-servers/'+id,{method:'DELETE'});
  document.getElementById('srv-'+id)?.remove();
}

document.getElementById('btn-add').onclick=async function(){
  const name  = document.getElementById('add-name').value.trim();
  const url   = document.getElementById('add-url').value.trim();
  const token = document.getElementById('add-token').value.trim();
  if(!name||!url){alert('Введи имя и URL'); return;}
  await fetch('/api/mcp-servers',{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,url,auth_token:token})});
  ['add-name','add-url','add-token'].forEach(id=>document.getElementById(id).value='');
  loadServers();
};

loadServers();
</script>
{% endblock %}
