{% extends "base.html" %}
{% block title %}Claude Clone{% endblock %}
{% block content %}
<div class="flex flex-col h-screen">
  <!-- Header -->
  <div class="h-14 border-b border-stone-200 bg-white/70 backdrop-blur px-6 flex items-center justify-between">
    <div class="flex items-center gap-3 pl-10 lg:pl-0">
      <h2 id="chat-title" class="font-medium text-stone-900 truncate max-w-[420px]">
        {{ active_conversation.title if active_conversation else 'Новый чат' }}
      </h2>
      <button id="rename-chat" class="text-stone-400 hover:text-stone-700" title="Переименовать">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
      </button>
    </div>
    <div class="flex items-center gap-2 text-xs text-stone-500">
      <span class="hidden sm:inline">Claude 3.5 Sonnet</span>
      <span class="w-1 h-1 bg-green-500 rounded-full"></span>
    </div>
  </div>

  <!-- Messages -->
  <div id="messages" class="flex-1 overflow-y-auto">
    <div id="messages-inner" class="max-w-3xl mx-auto px-4 sm:px-8 py-8 space-y-8">
      <!-- empty state injected by JS -->
    </div>
  </div>

  <!-- Input -->
  <div class="border-t border-stone-200 bg-[#f8fafc]">
    <div class="max-w-3xl mx-auto px-4 sm:px-8 py-5">
      <div class="bg-white rounded-2xl shadow-sm border border-stone-200">
        <textarea id="chat-input" rows="1" placeholder="Напишите сообщение Claude..." class="w-full px-4 pt-4 pb-2 resize-none bg-transparent focus:outline-none text-[15px] leading-relaxed min-h-[56px] max-h-48"></textarea>
        <div class="flex items-center justify-between px-3 pb-3">
          <div class="flex items-center gap-3 text-xs text-stone-500">
            <label class="flex items-center gap-2 cursor-pointer select-none">
              <input type="checkbox" id="extended-thinking" class="sr-only peer">
              <span class="w-9 h-5 bg-stone-200 rounded-full relative transition peer-checked:bg-amber-600">
                <span class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full transition peer-checked:translate-x-4"></span>
              </span>
              Расширенное мышление
            </label>
            <select id="model-select" class="bg-stone-50 border border-stone-200 rounded-lg px-2 py-1 text-xs">
              <option>Claude 3.5 Sonnet</option>
              <option>Claude 3 Opus</option>
              <option>Claude 3 Haiku</option>
            </select>
            <button class="hover:text-stone-700 hidden sm:block" title="Прикрепить файл">📎</button>
          </div>
          <button id="send-btn" class="px-4 py-2 rounded-xl bg-[#d97706] text-white text-sm font-medium hover:bg-[#b45309] disabled:opacity-50 flex items-center gap-2">
            <span>Отправить</span>
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
      </div>
      <p class="text-[11px] text-stone-400 text-center mt-3">Claude может допускать ошибки. Проверяйте важные данные.</p>
    </div>
  </div>
</div>

<script>
  window.ACTIVE_CONVERSATION_ID = {{ active_conversation.id if active_conversation else 'null' }};
</script>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% endblock %}
