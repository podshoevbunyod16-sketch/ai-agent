{% extends "base.html" %}
{% block title %}Claude Clone{% endblock %}
{% block content %}
<div class="flex flex-col h-screen">

  <!-- Header -->
  <div class="h-14 border-b border-stone-200 bg-white/70 backdrop-blur px-6 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3 pl-10 lg:pl-0">
      <h2 id="chat-title" class="font-medium text-stone-900 truncate max-w-[360px]">
        {{ active_conversation.title if active_conversation else 'Новый чат' }}
      </h2>
      <button id="rename-chat" class="text-stone-400 hover:text-stone-700" title="Переименовать">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
        </svg>
      </button>
    </div>
    <div class="flex items-center gap-2">
      <select id="model-select" class="text-xs px-2 py-1.5 rounded-lg bg-stone-50 border border-stone-200 text-stone-700 focus:outline-none focus:ring-2 focus:ring-amber-300">
        <option value="claude-3.5-sonnet">Claude 3.5 Sonnet</option>
        <option value="claude-3-opus">Claude 3 Opus</option>
        <option value="claude-3-haiku">Claude 3 Haiku</option>
        <option value="llama-3.3-70b-versatile">Llama 3.3 70B (Groq)</option>
      </select>
      <a href="/mcp-settings" class="text-xs px-2 py-1.5 rounded-lg border border-stone-200 bg-stone-50 hover:bg-stone-100 text-stone-600" title="MCP серверы">🛠️ MCP</a>
    </div>
  </div>

  <!-- Messages -->
  <div id="messages" class="flex-1 overflow-y-auto">
    <div id="messages-inner" class="max-w-3xl mx-auto px-4 sm:px-6 py-8 space-y-6"></div>
  </div>

  <!-- Input -->
  <div class="border-t border-stone-200 bg-stone-50 shrink-0">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 py-4">
      <div class="bg-white rounded-2xl shadow-sm border border-stone-200">
        <textarea id="chat-input" rows="1"
          placeholder="Задай вопрос, вставь ссылку, попроси проанализировать сайт..."
          class="w-full px-4 pt-4 pb-2 resize-none bg-transparent focus:outline-none text-[15px] leading-relaxed min-h-[56px] max-h-48"></textarea>
        <div class="flex items-center justify-between px-3 pb-3 gap-2 flex-wrap">
          <div class="flex items-center gap-3 text-xs text-stone-500 flex-wrap">

            <label class="flex items-center gap-1.5 cursor-pointer select-none">
              <input type="checkbox" id="extended-thinking" class="sr-only peer">
              <span class="w-8 h-4 bg-stone-200 rounded-full relative transition peer-checked:bg-amber-500">
                <span class="absolute top-0.5 left-0.5 w-3 h-3 bg-white rounded-full shadow transition-transform peer-checked:translate-x-4"></span>
              </span>
              <span>🧠 Мышление</span>
            </label>

            <label class="flex items-center gap-1.5 cursor-pointer select-none">
              <input type="checkbox" id="web-search-toggle" class="sr-only peer">
              <span class="w-8 h-4 bg-stone-200 rounded-full relative transition peer-checked:bg-blue-500">
                <span class="absolute top-0.5 left-0.5 w-3 h-3 bg-white rounded-full shadow transition-transform peer-checked:translate-x-4"></span>
              </span>
              <span>🔍 Поиск</span>
            </label>

            <label class="flex items-center gap-1.5 cursor-pointer select-none">
              <input type="checkbox" id="mcp-toggle" class="sr-only peer" checked>
              <span class="w-8 h-4 bg-stone-200 rounded-full relative transition peer-checked:bg-emerald-500">
                <span class="absolute top-0.5 left-0.5 w-3 h-3 bg-white rounded-full shadow transition-transform peer-checked:translate-x-4"></span>
              </span>
              <span>🛠️ MCP</span>
            </label>

          </div>
          <button id="send-btn"
            class="px-4 py-2 rounded-xl bg-amber-600 text-white text-sm font-medium hover:bg-amber-700 disabled:opacity-40 flex items-center gap-2 shrink-0">
            <span>Отправить</span>
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
          </button>
        </div>
      </div>
      <p class="text-[11px] text-stone-400 text-center mt-2">Claude может допускать ошибки. Проверяйте важные данные.</p>
    </div>
  </div>

</div>
<script>window.ACTIVE_CONVERSATION_ID = {{ active_conversation.id if active_conversation else 'null' }};</script>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% endblock %}
