<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — Claude Clone</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:Inter,ui-sans-serif,system-ui}</style>
</head>
<body class="bg-[#f8fafc] min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="w-12 h-12 rounded-2xl bg-stone-800 text-white flex items-center justify-center mx-auto text-xl font-bold">*</div>
      <h1 class="mt-4 text-2xl font-semibold text-stone-900">Создать аккаунт</h1>
    </div>
    <div class="bg-white rounded-2xl shadow-sm border border-stone-200 p-6">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for cat, msg in messages %}
            <div class="mb-4 text-sm px-3 py-2 rounded-xl bg-red-50 text-red-700 border border-red-100">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <form method="POST" class="space-y-4">
        <div>
          <label class="text-sm font-medium text-stone-700">Username</label>
          <input name="username" required class="mt-1 w-full px-3 py-2.5 rounded-xl border border-stone-300 focus:outline-none focus:ring-2 focus:ring-amber-500/30">
        </div>
        <div>
          <label class="text-sm font-medium text-stone-700">Email</label>
          <input name="email" type="email" required class="mt-1 w-full px-3 py-2.5 rounded-xl border border-stone-300 focus:outline-none focus:ring-2 focus:ring-amber-500/30">
        </div>
        <div>
          <label class="text-sm font-medium text-stone-700">Пароль</label>
          <input name="password" type="password" required class="mt-1 w-full px-3 py-2.5 rounded-xl border border-stone-300 focus:outline-none focus:ring-2 focus:ring-amber-500/30">
        </div>
        <button class="w-full py-2.5 rounded-xl bg-[#d97706] hover:bg-[#b45309] text-white font-medium transition">Зарегистрироваться</button>
      </form>
      <div class="text-center text-sm text-stone-500 mt-5">
        Уже есть аккаунт? <a href="{{ url_for('auth.login') }}" class="text-amber-700 hover:underline font-medium">Войти</a>
      </div>
    </div>
  </div>
</body>
</html>
