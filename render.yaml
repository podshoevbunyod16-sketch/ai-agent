# Render Blueprint for AI Chat Agent
# Deploy: Dashboard → Blueprints → New Blueprint → Connect repo
services:
  - type: web
    name: ai-chat-backend
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-chat-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FRONTEND_URL
        value: https://ai-chat-frontend.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://ai-chat-frontend.onrender.com,http://localhost:5173
      - key: DEFAULT_LLM_PROVIDER
        value: groq
      - key: DEFAULT_MODEL
        value: llama-3.3-70b-versatile

  - type: web
    name: ai-chat-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://ai-chat-backend.onrender.com
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false

databases:
  - name: ai-chat-db
    databaseName: ai_chat
    user: ai_chat_user
